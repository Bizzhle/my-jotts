

services:
  backend:
    container_name: portal-backend
    image: portal-backend
    build: .
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://admin:admin@db:5432/myjottsdb
    ports:
      - '4000:4000'
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    # networks:
    #   - activity-moves

  db:
    container_name: portal_dbmodel
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: myjottsdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_HOST: localhost
      PG_DATA: /var/lib/postgresql/data
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d myjottsdb']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    # networks:
    #   - activity-moves

  adminer:
    restart: always
    image: adminer
    container_name: dev_adminer
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db

volumes:
  pgdata: {}

networks:
  activity-moves:
    driver: bridge
    name: activity-moves
